{% extends 'portefolio/base.html' %}


{% block content %}

<h1>Competências</h1>

<a href="{% url 'nova_competencia' %}">
    <button>Criar Competência</button>
</a>

<hr>

{% for competencia in competencias %}

    <div>

        <h2>{{ competencia.nome }}</h2>

        <a href="{% url 'edita_competencia' competencia.id %}">
            <button>Editar</button>
        </a>

        <a href="{% url 'apaga_competencia' competencia.id %}">
            <button>Apagar</button>
        </a>

    </div>

    <hr>

{% endfor %}

{% endblock %}
